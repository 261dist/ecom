name: Deploy MkDocs to GitHub Pages .

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions

      - name: Configurar topics académicos
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Falta el secreto REPO_ADMIN_TOKEN. Debe tener permiso Administration: Read and write sobre $REPOSITORY."
            exit 1
          fi

          expected='["campus-juliaca","linea-software","curso-distribuidas","grupo-gu","equipo-thereeds"]'

          response="$(
            jq -n --argjson names "$expected" '{names: $names}' |
              gh api \
                --method PUT \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/$REPOSITORY/topics" \
                --input -
          )"

          actual="$(jq -c '.names | sort' <<<"$response")"
          wanted="$(jq -c 'sort' <<<"$expected")"

          if [ "$actual" != "$wanted" ]; then
            echo "::error::GitHub no guardó todos los topics. Esperados: $wanted. Recibidos: $actual."
            exit 1
          fi

          echo "Topics configurados: $actual"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
