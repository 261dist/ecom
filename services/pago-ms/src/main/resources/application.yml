spring:
  application:
    name: pago-ms
  profiles:
    active: dev

  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:7071}"

app:
  kafka:
    topic:
      ordenes: orden-eventos
      pagos: pago-eventos
    group-id:
      pagos: pago-ms-group

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
