name: ecom-infra

services:
  config:
    build:
      context: ./config
      dockerfile: Dockerfile
    container_name: ecom-config
    restart: unless-stopped
    ports:
      - "28888:8888"
    volumes:
      - ./config/config-repo:/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_LOCATION: file:/config-repo
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - ecom-prod-net

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: ecom-eureka
    restart: unless-stopped
    ports:
      - "28761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://ecom-config:8888
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      config:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - ecom-prod-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ecom-gateway
    restart: unless-stopped
    ports:
      - "28080:8080"
    volumes:
      - ./gateway/logs:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://ecom-config:8888
    depends_on:
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - ecom-prod-net

networks:
  ecom-prod-net:
    name: ecom-prod-net
